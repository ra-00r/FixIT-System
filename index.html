<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FixIT Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
<h2>⚙️ FixIT</h2>
<a href="index.html">Dashboard</a>
<a href="add.html">New Ticket</a>
<a onclick="logout()">Logout</a>
</div>

<div class="main">

<h1>Dashboard</h1>

<input id="search" placeholder="Search..." onkeyup="search()">

<div class="cards">
<div class="card">Open <span id="open"></span></div>
<div class="card">Progress <span id="progress"></span></div>
<div class="card">Closed <span id="closed"></span></div>
</div>

<canvas id="chart"></canvas>

<table>
<thead>
<tr>
<th>ID</th>
<th>Subject</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="app.js"></script>
</body>
</html>
